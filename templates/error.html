{% extends "layout.html" %}

{% block content %}

<div class="container text-center mt-5">

    <div class="card shadow p-5">

        <h1 class="display-4 text-danger">
            ❌ Oops!
        </h1>

        <h4 class="mt-3">
            Something went wrong while processing your request.
        </h4>

        <hr>

        <p class="text-muted">
            {{ error }}
        </p>

        <a href="/" class="btn btn-primary mt-4">
            🔙 Go Back Home
        </a>

    </div>

</div>

{% endblock %}
